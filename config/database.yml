default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: rintu_shop_development

test:
  <<: *default
  database: rintu_shop_test

production:
  primary: &primary_production
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: rintu_shop_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rintu_shop_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rintu_shop_production_cable
    migrations_paths: db/cable_migrate